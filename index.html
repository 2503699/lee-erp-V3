<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>員工出勤管理系統 v3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, collection, doc, setDoc, getDocs, updateDoc, deleteDoc, addDoc, onSnapshot, query, where } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

        const firebaseConfig = {
            apiKey: "AIzaSyDwb-QTbwdVgQ2rLWekv70xY5Nk2YkHiak",
            authDomain: "lee-erp-c38bf.firebaseapp.com",
            projectId: "lee-erp-c38bf",
            storageBucket: "lee-erp-c38bf.firebasestorage.app",
            messagingSenderId: "1085101558311",
            appId: "1:1085101558311:web:4207f31dc3b2656d091c02",
            measurementId: "G-LFSV2SB4B8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        window.firebaseDB = db;
        window.firebaseAuth = auth;
        window.firebaseModules = {
            collection, doc, setDoc, getDocs, updateDoc, deleteDoc, addDoc, onSnapshot, query, where
        };
        window.googleSignIn = () => signInWithPopup(auth, googleProvider);
        window.googleSignOut = () => signOut(auth);
    </script>

    <style>
        * { -webkit-tap-highlight-color: transparent; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        #loading-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <div id="loading-screen">
        <div class="text-center">
            <div class="text-white text-3xl font-black mb-4 animate-pulse">載入中...</div>
            <div class="text-white/80 text-sm">正在連接雲端數據庫</div>
        </div>
    </div>

    <div id="app"></div>

    <script>
        class App {
            constructor() {
                this.db = window.firebaseDB;
                this.auth = window.firebaseAuth;
                this.modules = window.firebaseModules;
                
                this.currentUser = null;
                this.userPath = null; // e.g. 'companies/uid'
                this.view = 'attendance';
                this.selectedDate = new Date().toISOString().split('T')[0];
                
                const now = new Date();
                this.reportStart = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
                this.reportEnd = new Date(now.getFullYear(), now.getMonth() + 1, 0).toISOString().split('T')[0];
                this.statsYear = now.getFullYear();
                this.expandedEmp = null;
                this.overtimeFilterStart = null;
                this.overtimeFilterEnd = null;

                this.modals = { employee: false, adjustment: false, overtime: false, attendance: false, locationManagement: false, salaryHistory: false };
                this.currentEmp = { name: '', dailyRate: 0, status: 'active' };
                this.currentAdj = { empId: '', empName: '', amount: 0, note: '' };
                this.currentOvertime = { empId: '', overtimePay: '', loan: '', date: new Date().toISOString().split('T')[0], note: '', isOvertimeChecked: false };
                this.currentAttendance = { empId: '', empName: '', location: '' };
                this.currentSalaryHistory = { empId: '', empName: '', history: [] };

                this.employees = [];
                this.attendance = {};
                this.adjustments = {};
                this.overtimes = [];
                this.salaryHistory = {};
                this.locations = [];

                this._unsubscribers = [];
                this.initFirebase();
            }

            async initFirebase() {
                this.auth.onAuthStateChanged(async (user) => {
                    if (user) {
                        this.currentUser = user;
                        this.userPath = `companies/${user.uid}`;
                        console.log('已登入:', user.uid, user.email);
                        // Unsubscribe previous listeners on re-login
                        this._unsubscribers.forEach(fn => fn());
                        this._unsubscribers = [];
                        await this.setupRealtimeListeners();
                    } else {
                        this.currentUser = null;
                        this.userPath = null;
                        this.employees = [];
                        this.attendance = {};
                        this.adjustments = {};
                        this.overtimes = [];
                        this.salaryHistory = {};
                        this.locations = [];
                    }
                    setTimeout(() => {
                        document.getElementById('loading-screen').style.display = 'none';
                        this.render();
                    }, 500);
                });
            }

            async signIn() {
                try {
                    await window.googleSignIn();
                } catch (err) {
                    console.error("登入失敗:", err);
                    alert('登入失敗，請重試');
                }
            }

            async signOut() {
                if (confirm('確定要登出嗎？')) {
                    this._unsubscribers.forEach(fn => fn());
                    this._unsubscribers = [];
                    await window.googleSignOut();
                }
            }

            async setupRealtimeListeners() {
                const { collection, onSnapshot } = this.modules;
                const base = this.userPath;

                const unsub1 = onSnapshot(collection(this.db, `${base}/employees`), (snapshot) => {
                    this.employees = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    this.render();
                });
                const unsub2 = onSnapshot(collection(this.db, `${base}/attendance`), (snapshot) => {
                    this.attendance = {};
                    snapshot.docs.forEach(doc => { this.attendance[doc.id] = doc.data(); });
                    this.render();
                });
                const unsub3 = onSnapshot(collection(this.db, `${base}/adjustments`), (snapshot) => {
                    this.adjustments = {};
                    snapshot.docs.forEach(doc => { this.adjustments[doc.id] = doc.data(); });
                    this.render();
                });
                const unsub4 = onSnapshot(collection(this.db, `${base}/overtimes`), (snapshot) => {
                    this.overtimes = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    this.render();
                });
                const unsub5 = onSnapshot(collection(this.db, `${base}/salaryHistory`), (snapshot) => {
                    this.salaryHistory = {};
                    snapshot.docs.forEach(doc => { this.salaryHistory[doc.id] = doc.data(); });
                    this.render();
                });
                const unsub6 = onSnapshot(collection(this.db, `${base}/locations`), (snapshot) => {
                    this.locations = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    this.render();
                });
                this._unsubscribers.push(unsub1, unsub2, unsub3, unsub4, unsub5, unsub6);
            }

            getDailyRateAtDate(empId, date) {
                const history = this.salaryHistory[empId];
                if (!history) {
                    const emp = this.employees.find(e => e.id === empId);
                    return emp ? emp.dailyRate : 0;
                }
                
                let historyArray = [];
                if (Array.isArray(history)) {
                    historyArray = history;
                } else if (typeof history === 'object') {
                    historyArray = Object.values(history);
                }
                
                if (historyArray.length === 0) {
                    const emp = this.employees.find(e => e.id === empId);
                    return emp ? emp.dailyRate : 0;
                }
                
                const sortedHistory = [...historyArray].sort((a, b) => new Date(a.date) - new Date(b.date));
                let applicableRate = sortedHistory[0].dailyRate;
                
                for (const record of sortedHistory) {
                    if (record.date <= date) {
                        applicableRate = record.dailyRate;
                    } else {
                        break;
                    }
                }
                
                return applicableRate;
            }

            render() {
                const app = document.getElementById('app');
                if (!app) return;

                if (!this.currentUser) {
                    app.innerHTML = this.renderLoginScreen();
                    return;
                }
                
                app.innerHTML = `
                    <div class="p-2 sm:p-6">
                        ${this.renderHeader()}
                        ${this.renderNav()}
                        <main class="max-w-6xl mx-auto">
                            ${this.renderContent()}
                        </main>
                    </div>
                    ${this.renderModals()}
                `;
                this.attachEventListeners();
            }

            renderLoginScreen() {
                return `
                    <div class="min-h-screen flex items-center justify-center p-4">
                        <div class="bg-white rounded-3xl p-8 sm:p-12 w-full max-w-md shadow-2xl text-center space-y-8">
                            <div>
                                <h1 class="text-3xl font-black bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent mb-2">員工出勤管理系統</h1>
                                <p class="text-gray-400 text-sm">每間公司獨立帳號 · 數據完全隔離</p>
                            </div>
                            <div class="bg-blue-50 p-4 rounded-2xl text-left space-y-2">
                                <div class="text-xs font-bold text-blue-700 mb-3">🔒 安全架構說明</div>
                                <div class="text-xs text-blue-600">• 使用 Google 帳號登入，一帳號代表一間公司</div>
                                <div class="text-xs text-blue-600">• 各公司數據完全隔離，無法互相讀取</div>
                                <div class="text-xs text-blue-600">• 多裝置登入同一帳號即可共用資料</div>
                            </div>
                            <button onclick="app.signIn()" 
                                class="w-full bg-white border-2 border-gray-200 hover:border-blue-400 hover:bg-blue-50 text-gray-700 py-4 px-6 rounded-2xl font-bold flex items-center justify-center gap-3 transition-all shadow-sm text-base">
                                <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#4285F4" d="M44.5 20H24v8.5h11.8C34.7 33.9 29.9 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 4.1 29.6 2 24 2 11.8 2 2 11.8 2 24s9.8 22 22 22c11 0 21-8 21-22 0-1.3-.2-2.7-.5-4z"/><path fill="#34A853" d="M6.3 14.7l7 5.1C15 16.1 19.2 13 24 13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 4.1 29.6 2 24 2 16.3 2 9.7 7.4 6.3 14.7z"/><path fill="#FBBC05" d="M24 46c5.8 0 10.7-1.9 14.3-5.2l-6.6-5.6C29.9 37 27.1 38 24 38c-5.8 0-10.7-3.9-11.8-9.2l-7 5.4C8.5 41.8 15.7 46 24 46z"/><path fill="#EA4335" d="M44.5 20H24v8.5h11.8c-1 2.8-2.8 5-5.1 6.5l6.6 5.6C41.3 37.5 44.5 31.2 44.5 24c0-1.3-.2-2.7-.5-4z"/></svg>
                                使用 Google 帳號登入
                            </button>
                            <p class="text-xs text-gray-400">登入即代表您同意本系統之使用條款</p>
                        </div>
                    </div>
                `;
            }

            renderHeader() {
                return `
                    <header class="mb-6 sm:mb-8">
                        <div class="max-w-6xl mx-auto bg-white p-4 sm:p-6 rounded-3xl shadow-lg border-l-8 border-blue-600">
                            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                                <div>
                                    <h1 class="text-2xl sm:text-3xl font-black bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">員工出勤管理系統</h1>
                                    <p class="text-xs sm:text-sm text-gray-500 mt-1">☁️ 雲端同步 · 多裝置共用</p>
                                </div>
                                <div class="flex items-center gap-3">
                                    <div class="flex items-center gap-2 text-xs sm:text-sm">
                                        <div class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></div>
                                        <span class="font-bold text-gray-600 hidden sm:inline">${this.currentUser?.email || ''}</span>
                                    </div>
                                    <button onclick="app.signOut()" class="text-xs text-gray-400 hover:text-red-500 font-bold px-3 py-1 rounded-lg hover:bg-red-50 transition border border-gray-200">
                                        登出
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>
                `;
            }

            renderNav() {
                const navItems = [
                    { id: 'attendance', label: '每日出勤', icon: '📅' },
                    { id: 'report', label: '薪資結算', icon: '💰' },
                    { id: 'overtimes', label: '加班&借支', icon: '💳' },
                    { id: 'stats', label: '年度統計', icon: '📊' },
                    { id: 'employees', label: '員工管理', icon: '👥' }
                ];

                return `
                    <nav class="max-w-6xl mx-auto mb-6 bg-white p-2 rounded-2xl shadow-md flex flex-wrap gap-2">
                        ${navItems.map(item => `
                            <button onclick="app.setView('${item.id}')" class="flex-1 min-w-[80px] sm:min-w-0 py-3 px-2 sm:px-4 rounded-xl font-bold flex items-center justify-center gap-2 transition-all text-xs sm:text-sm ${
                                this.view === item.id ? 'bg-blue-600 text-white shadow-lg scale-105' : 'text-gray-600 hover:bg-gray-100'
                            }">
                                <span class="text-base">${item.icon}</span>
                                <span class="hidden sm:inline">${item.label}</span>
                            </button>
                        `).join('')}
                    </nav>
                `;
            }

            renderContent() {
                switch(this.view) {
                    case 'attendance': return this.renderAttendance();
                    case 'report': return this.renderReport();
                    case 'overtimes': return this.renderOvertimes();
                    case 'stats': return this.renderStats();
                    case 'employees': return this.renderEmployees();
                }
            }

            renderAttendance() {
                const employees = this.employees.filter(e => e.status === 'active').sort((a, b) => a.name.localeCompare(b.name));
                
                return `
                    <div class="space-y-4">
                        <div class="bg-white p-4 sm:p-6 rounded-2xl shadow-sm border-l-8 border-blue-600">
                            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                                <h2 class="text-lg sm:text-xl font-bold">出勤打卡</h2>
                                <input type="date" id="selectedDate" value="${this.selectedDate}" class="bg-gray-50 p-2 sm:p-3 rounded-xl font-bold border-2 border-gray-200 outline-none text-sm sm:text-base w-full sm:w-auto" />
                            </div>
                        </div>

                        <div class="grid gap-3">
                            ${employees.map(emp => {
                                const attData = this.attendance[emp.id] || {};
                                const isPresent = attData.dates?.[this.selectedDate] || false;
                                const location = attData.locations?.[this.selectedDate] || '';
                                const currentRate = this.getDailyRateAtDate(emp.id, this.selectedDate);
                                
                                return `
                                    <div class="p-4 sm:p-6 rounded-2xl font-bold transition-all shadow-lg ${
                                        isPresent ? 'bg-gradient-to-r from-emerald-500 to-green-600 text-white' : 'bg-white text-gray-700'
                                    }">
                                        <div class="flex justify-between items-start mb-3">
                                            <div class="flex items-center gap-3 sm:gap-4">
                                                <div class="w-12 h-12 sm:w-14 sm:h-14 rounded-xl flex items-center justify-center font-black text-lg sm:text-xl ${isPresent ? 'bg-white/20' : 'bg-blue-50 text-blue-600'}">
                                                    ${emp.name.charAt(0)}
                                                </div>
                                                <div>
                                                    <div class="text-base sm:text-lg">${emp.name}</div>
                                                    <div class="text-xs ${isPresent ? 'text-white/80' : 'text-gray-400'}">當日日薪 $${currentRate}</div>
                                                </div>
                                            </div>
                                            <button onclick="app.toggleAttendance('${emp.id}')" class="px-4 py-2 rounded-xl font-bold transition-all ${
                                                isPresent ? 'bg-white/20 hover:bg-white/30' : 'bg-blue-600 text-white hover:bg-blue-700'
                                            }">
                                                ${isPresent ? '✓ 已打卡' : '打卡'}
                                            </button>
                                        </div>
                                        
                                        ${isPresent ? `
                                            <div class="flex items-center gap-2">
                                                <div class="flex-1">
                                                    <input 
                                                        type="text" 
                                                        value="${location}" 
                                                        onchange="app.updateLocation('${emp.id}', this.value)"
                                                        placeholder="輸入案場地點..."
                                                        class="w-full bg-white/20 border-2 border-white/30 text-white placeholder-white/60 p-2 rounded-lg outline-none text-sm"
                                                    />
                                                </div>
                                                <button onclick="app.openLocationModal('${emp.id}', '${emp.name}')" class="px-3 py-2 bg-white/20 hover:bg-white/30 rounded-lg text-sm">
                                                    📍 快選
                                                </button>
                                            </div>
                                        ` : ''}
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            }

            renderReport() {
                const reportData = this.calculateReport();
                
                return `
                    <div class="space-y-4 sm:space-y-6">
                        <div class="bg-white p-4 sm:p-6 rounded-2xl shadow-sm border-l-8 border-emerald-600">
                            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                                <h2 class="text-lg sm:text-xl font-bold">薪資結算</h2>
                                <div class="flex flex-col sm:flex-row gap-2 w-full sm:w-auto">
                                    <input type="date" id="reportStart" value="${this.reportStart}" class="bg-gray-50 p-2 sm:p-3 rounded-xl font-bold border-2 border-gray-200 outline-none text-xs sm:text-sm" />
                                    <span class="hidden sm:flex items-center text-gray-400 font-bold">至</span>
                                    <input type="date" id="reportEnd" value="${this.reportEnd}" class="bg-gray-50 p-2 sm:p-3 rounded-xl font-bold border-2 border-gray-200 outline-none text-xs sm:text-sm" />
                                    <button onclick="app.downloadReportExcel()" class="bg-emerald-600 text-white px-3 sm:px-4 py-2 sm:py-3 rounded-xl font-bold flex items-center gap-2 shadow-lg text-xs sm:text-sm justify-center">
                                        <span>📊</span> Excel
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div class="space-y-3">
                            ${reportData.map(d => `
                                <div class="bg-white p-4 sm:p-6 rounded-2xl shadow-sm border border-gray-100">
                                    <div class="flex justify-between items-start mb-4">
                                        <div class="flex items-center gap-3 sm:gap-4">
                                            <div class="w-10 h-10 sm:w-12 sm:h-12 bg-gradient-to-br from-blue-500 to-indigo-600 text-white rounded-xl flex items-center justify-center font-black text-base sm:text-lg">${d.name.charAt(0)}</div>
                                            <div>
                                                <div class="font-bold text-base sm:text-lg">${d.name}</div>
                                                <div class="text-xs text-gray-400">${d.days} 天 (平均日薪 $${d.avgDailyRate})</div>
                                            </div>
                                        </div>
                                        <button onclick="app.openAdjustment('${d.id}', '${d.name}', ${d.adj})" class="text-emerald-600 p-2 hover:bg-emerald-50 rounded-lg transition-colors" title="薪資調整">
                                            ⚙️
                                        </button>
                                    </div>

                                    <div class="grid grid-cols-2 sm:grid-cols-5 gap-3 mb-4">
                                        <div class="bg-blue-50 p-3 rounded-xl">
                                            <div class="text-xs text-gray-500 font-bold">基本薪資</div>
                                            <div class="text-base sm:text-lg font-black text-blue-600">$${d.baseSalary}</div>
                                        </div>
                                        <div class="bg-emerald-50 p-3 rounded-xl">
                                            <div class="text-xs text-gray-500 font-bold">調整金額</div>
                                            <div class="text-base sm:text-lg font-black text-emerald-600">${d.adj >= 0 ? '+' : ''}${d.adj}</div>
                                        </div>
                                        <div class="bg-purple-50 p-3 rounded-xl">
                                            <div class="text-xs text-gray-500 font-bold">加班費</div>
                                            <div class="text-base sm:text-lg font-black text-purple-600">+$${d.totalOvertimePay}</div>
                                        </div>
                                        <div class="bg-amber-50 p-3 rounded-xl">
                                            <div class="text-xs text-gray-500 font-bold">借支扣款</div>
                                            <div class="text-base sm:text-lg font-black text-amber-600">-$${d.totalLoan}</div>
                                        </div>
                                        <div class="bg-gradient-to-br from-indigo-500 to-purple-600 p-3 rounded-xl col-span-2 sm:col-span-1">
                                            <div class="text-xs text-white/80 font-bold">實發薪資</div>
                                            <div class="text-base sm:text-lg font-black text-white">$${d.finalSalary}</div>
                                        </div>
                                    </div>

                                    ${d.locationStats.length > 0 ? `
                                        <div class="border-t pt-3 mb-3">
                                            <div class="text-xs font-bold text-gray-400 mb-2">案場出勤統計：</div>
                                            <div class="grid grid-cols-2 sm:grid-cols-3 gap-2">
                                                ${d.locationStats.map(loc => `
                                                    <div class="bg-blue-50 p-2 rounded-lg">
                                                        <div class="text-xs text-gray-600">${loc.location || '未填寫'}</div>
                                                        <div class="text-sm font-bold text-blue-600">${loc.days} 天</div>
                                                    </div>
                                                `).join('')}
                                            </div>
                                        </div>
                                    ` : ''}

                                    ${d.empOvertimes.length > 0 ? `
                                        <div class="border-t pt-3">
                                            <div class="text-xs font-bold text-gray-400 mb-2">加班&借支明細：</div>
                                            <div class="space-y-1">
                                                ${d.empOvertimes.map(ot => `
                                                    <div class="text-xs text-gray-600 flex justify-between">
                                                        <span>${ot.date} - ${ot.note || '無備註'}</span>
                                                        <span class="font-bold">
                                                            ${ot.overtimePay > 0 ? `<span class="text-purple-600">加班 $${ot.overtimePay}</span>` : ''}
                                                            ${ot.overtimePay > 0 && ot.loan > 0 ? ' | ' : ''}
                                                            ${ot.loan > 0 ? `<span class="text-amber-600">借支 $${ot.loan}</span>` : ''}
                                                        </span>
                                                    </div>
                                                `).join('')}
                                            </div>
                                        </div>
                                    ` : ''}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            renderOvertimes() {
                // 取得當月的開始和結束日期
                const now = new Date();
                const defaultStart = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
                const defaultEnd = new Date(now.getFullYear(), now.getMonth() + 1, 0).toISOString().split('T')[0];
                
                // 使用篩選日期或預設當月
                const filterStart = this.overtimeFilterStart || defaultStart;
                const filterEnd = this.overtimeFilterEnd || defaultEnd;
                
                // 篩選加班借支記錄
                const filteredOvertimes = this.overtimes
                    .filter(ot => ot.date >= filterStart && ot.date <= filterEnd)

            async saveEmployee() {
                const name = document.getElementById('empName').value.trim();
                const newRate = Number(document.getElementById('empRate').value);
                const rateNote = document.getElementById('empRateNote')?.value.trim() || '';
                
                if (!name || !newRate) return alert('請填寫完整資料');
                
                const { collection, doc, addDoc, updateDoc, setDoc } = this.modules;
                
                if (this.currentEmp.id) {
                    const emp = this.employees.find(e => e.id === this.currentEmp.id);
                    
                    if (emp && emp.dailyRate !== newRate) {
                        const historyRef = doc(this.db, `${this.userPath}/salaryHistory`, this.currentEmp.id);
                        const currentHistory = this.salaryHistory[this.currentEmp.id] || [];
                        
                        const updatedHistory = Array.isArray(currentHistory) ? 
                            [...currentHistory] : 
                            (currentHistory ? Object.values(currentHistory) : []);
                        
                        updatedHistory.push({
                            date: new Date().toISOString().split('T')[0],
                            dailyRate: newRate,
                            note: rateNote || '日薪調整',
                            timestamp: Date.now()
                        });
                        
                        await setDoc(historyRef, updatedHistory);
                    }
                    
                    await updateDoc(doc(this.db, `${this.userPath}/employees`, this.currentEmp.id), { 
                        name, 
                        dailyRate: newRate,
                        status: this.currentEmp.status
                    });
                } else {
                    const empRef = await addDoc(collection(this.db, `${this.userPath}/employees`), { 
                        name, 
                        dailyRate: newRate, 
                        status: 'active', 
                        createdAt: Date.now() 
                    });
                    
                    await setDoc(doc(this.db, `${this.userPath}/salaryHistory`, empRef.id), [{
                        date: new Date().toISOString().split('T')[0],
                        dailyRate: newRate,
                        note: '初始日薪',
                        timestamp: Date.now()
                    }]);
                }
                
                this.closeModal('employee');

            calculateReport() {
                const start = new Date(this.reportStart);
                const end = new Date(this.reportEnd);
                const dates = [];
                
                for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
                    dates.push(new Date(d).toISOString().split('T')[0]);
                }

                return this.employees.filter(e => e.status === 'active').map(emp => {
                    const attData = this.attendance[emp.id] || { dates: {}, locations: {} };
                    const workDates = dates.filter(d => attData.dates?.[d]);
                    const days = workDates.length;
                    
                    let baseSalary = 0;
                    let totalRate = 0;
                    workDates.forEach(date => {
                        const rate = this.getDailyRateAtDate(emp.id, date);
                        baseSalary += rate;
                        totalRate += rate;
                    });
                    const avgDailyRate = days > 0 ? Math.round(totalRate / days) : emp.dailyRate;
                    
                    const adj = this.adjustments[`${this.reportStart}_${this.reportEnd}_${emp.id}`]?.amount || 0;
                    
                    const empOvertimes = this.overtimes.filter(ot => ot.empId === emp.id && ot.date >= this.reportStart && ot.date <= this.reportEnd);
                    const totalOvertimePay = empOvertimes.reduce((s, ot) => s + (ot.overtimePay || 0), 0);
                    const totalLoan = empOvertimes.reduce((s, ot) => s + (ot.loan || 0), 0);
                    
                    const locationMap = {};
                    dates.forEach(d => {
                        if (attData.dates?.[d]) {
                            const loc = attData.locations?.[d] || '未填寫';
                            locationMap[loc] = (locationMap[loc] || 0) + 1;
                        }
                    });
                    const locationStats = Object.entries(locationMap).map(([location, days]) => ({ location, days })).sort((a, b) => b.days - a.days);
                    
                    return { 
                        id: emp.id, 
                        name: emp.name, 
                        dailyRate: emp.dailyRate,
                        avgDailyRate,
                        days, 
                        baseSalary, 
                        adj,
                        totalOvertimePay,
                        totalLoan,
                        finalSalary: baseSalary + adj + totalOvertimePay - totalLoan,
                        empOvertimes,
                        locationStats
                    };
                });
            }

            calculateStats() {
                const yearStart = `${this.statsYear}-01-01`;
                const yearEnd = `${this.statsYear}-12-31`;
                const days = [];
                
                for (let d = new Date(yearStart); d <= new Date(yearEnd); d.setDate(d.getDate() + 1)) {
                    days.push(new Date(d).toISOString().split('T')[0]);
                }

                return this.employees.filter(e => e.status === 'active').map(emp => {
                    const attData = this.attendance[emp.id] || { dates: {}, locations: {} };
                    
                    const monthlyData = Array.from({ length: 12 }, (_, i) => {
                        const month = i + 1;
                        const monthDays = days.filter(d => {
                            const [y, m] = d.split('-');
                            return Number(y) === this.statsYear && Number(m) === month;
                        });
                        const workedDays = monthDays.filter(d => attData.dates?.[d]).length;
                        return { month, days: workedDays };
                    });

                    // 計算全年案場統計
                    const locationMap = {};
                    days.forEach(d => {
                        if (attData.dates?.[d]) {
                            const loc = attData.locations?.[d] || '未填寫';
                            locationMap[loc] = (locationMap[loc] || 0) + 1;
                        }
                    });
                    const locationStats = Object.entries(locationMap).map(([location, days]) => ({ location, days })).sort((a, b) => b.days - a.days);

                    const totalDays = monthlyData.reduce((sum, m) => sum + m.days, 0);
                    return { id: emp.id, name: emp.name, monthlyData, totalDays, locationStats };
                });
            }

            filterOvertimes() {
                this.overtimeFilterStart = document.getElementById('overtimeFilterStart').value;
                this.overtimeFilterEnd = document.getElementById('overtimeFilterEnd').value;
                this.render();
            }

            async handleImport(e) {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = async (event) => {
                    try {
                        const data = new Uint8Array(event.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                        const rows = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
                        
                        const { collection, addDoc, doc, setDoc } = this.modules;
                        let count = 0;
                        
                        for (let i = 1; i < rows.length; i++) {
                            const [name, rate] = rows[i];
                            if (name && rate) {
                                const empRef = await addDoc(collection(this.db, `${this.userPath}/employees`), {
                                    name: String(name).trim(),
                                    dailyRate: Number(rate),
                                    status: 'active',
                                    createdAt: Date.now()
                                });
                                await setDoc(doc(this.db, `${this.userPath}/salaryHistory`, empRef.id), [{
                                    date: new Date().toISOString().split('T')[0],
                                    dailyRate: Number(rate),
                                    note: '初始日薪（匯入）',
                                    timestamp: Date.now()
                                }]);
                                count++;
                            }
                        }
                        
                        alert(`成功匯入 ${count} 位員工！`);
                    } catch (err) {
                        console.error(err);
                        alert('匯入失敗，請確認檔案格式正確');
                    }
                };
                reader.readAsArrayBuffer(file);
                e.target.value = '';
            }

            openLocationManagement() {
                this.modals.locationManagement = true;
                this.render();
            }

            async deleteLocation(locationId, locationName) {
                if (!confirm(`確定要從快選列表中移除「${locationName}」嗎？\n\n注意：這不會刪除歷史記錄，只是從快選列表中移除此案場。`)) {
                    return;
                }
                const { doc, deleteDoc } = this.modules;
                await deleteDoc(doc(this.db, `${this.userPath}/locations`, locationId));
                this.render();
            }

            viewSalaryHistory(empId, empName) {
                this.currentSalaryHistory = { empId, empName };
                this.modals.salaryHistory = true;
                this.render();
            }

            renderLocationManagementModal() {
                const sortedLocations = [...this.locations].sort((a, b) => b.count - a.count);

                return `
                    <div class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50" 
                         onclick="if(event.target === this) app.closeModal('locationManagement')">
                        <div class="bg-white rounded-3xl p-6 sm:p-8 w-full max-w-md shadow-2xl space-y-6">
                            <h3 class="text-xl sm:text-2xl font-black text-center">案場管理</h3>
                            <p class="text-xs text-gray-400 text-center">
                                管理常用案場列表（已完工的案場可以刪除）
                            </p>
                            
                            <div class="space-y-2 max-h-96 overflow-y-auto">
                                ${sortedLocations.length > 0 ? sortedLocations.map(loc => `
                                    <div class="bg-gray-50 p-3 rounded-xl flex justify-between items-center">
                                        <div>
                                            <div class="font-bold text-sm">📍 ${loc.name}</div>
                                            <div class="text-xs text-gray-400">使用 ${loc.count} 次</div>
                                        </div>
                                        <button 
                                            onclick="app.deleteLocation('${loc.id}', '${loc.name.replace(/'/g, "\\'")}')" 
                                            class="text-red-400 hover:text-red-600 transition-colors p-2"
                                            title="從快選列表移除"
                                        >
                                            🗑️
                                        </button>
                                    </div>
                                `).join('') : `
                                    <div class="text-center text-gray-400 py-8">
                                        <p>尚無案場記錄</p>
                                        <p class="text-xs mt-2">打卡時輸入案場地點後會自動新增到這裡</p>
                                    </div>
                                `}
                            </div>
                            
                            <button onclick="app.closeModal('locationManagement')" 
                                    class="w-full py-3 font-bold text-gray-400">
                                關閉
                            </button>
                        </div>
                    </div>
                `;
            }

            renderSalaryHistoryModal() {
                const history = this.salaryHistory[this.currentSalaryHistory.empId];
                let historyArray = [];
                
                if (Array.isArray(history)) {
                    historyArray = history;
                } else if (history && typeof history === 'object') {
                    historyArray = Object.values(history);
                }
                
                const sortedHistory = [...historyArray].sort((a, b) => 
                    new Date(b.date) - new Date(a.date)
                );

                return `
                    <div class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50" 
                         onclick="if(event.target === this) app.closeModal('salaryHistory')">
                        <div class="bg-white rounded-3xl p-6 sm:p-8 w-full max-w-md shadow-2xl space-y-6">
                            <h3 class="text-xl sm:text-2xl font-black text-center">日薪歷史記錄</h3>
                            <p class="text-sm text-gray-500 text-center">
                                ${this.currentSalaryHistory.empName}
                            </p>
                            
                            <div class="space-y-2 max-h-96 overflow-y-auto">
                                ${sortedHistory.length > 0 ? sortedHistory.map((record, index) => `
                                    <div class="bg-gray-50 p-4 rounded-xl ${index === 0 ? 'border-2 border-blue-500' : ''}">
                                        <div class="flex justify-between items-start mb-2">
                                            <div>
                                                <div class="font-bold text-lg text-blue-600">
                                                    $${record.dailyRate}
                                                </div>
                                                <div class="text-xs text-gray-400">${record.date}</div>
                                            </div>
                                            ${index === 0 ? '<span class="text-xs bg-blue-500 text-white px-2 py-1 rounded-full">目前</span>' : ''}
                                        </div>
                                        ${record.note ? `
                                            <div class="text-xs text-gray-600 mt-2">📝 ${record.note}</div>
                                        ` : ''}
                                    </div>
                                `).join('') : `
                                    <div class="text-center text-gray-400 py-8">
                                        <p>尚無日薪記錄</p>
                                    </div>
                                `}
                            </div>
                            
                            <div class="bg-blue-50 p-3 rounded-xl text-xs text-blue-600">
                                💡 報表會根據打卡日期自動使用當時的日薪計算，調薪不會影響歷史報表
                            </div>
                            
                            <button onclick="app.closeModal('salaryHistory')" 
                                    class="w-full py-3 font-bold text-gray-400">
                                關閉
                            </button>
                        </div>
                    </div>
                `;
            }
        }

        let app;
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => { 
                if (window.firebaseDB && window.firebaseAuth) {
                    app = new App(); 
                }
            }, 800);
        });
    </script>
</body>
</html>
